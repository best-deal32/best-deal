<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Best Deal Mobile | المنصة الاحترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap');
        
        :root {
            --bg: #020617; --card: rgba(255,255,255,0.03); --text: #f8fafc; --border: rgba(255,255,255,0.08);
            --accent: #10b981;
        }
        .light-mode {
            --bg: #f8fafc; --card: rgba(255,255,255,0.9); --text: #0f172a; --border: rgba(0,0,0,0.05);
            --accent: #059669;
        }

        body { 
            font-family: 'IBM Plex Sans Arabic', sans-serif; 
            background: var(--bg); color: var(--text); 
            transition: all 0.4s ease; overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .glass { background: var(--card); backdrop-filter: blur(20px); border: 1px solid var(--border); }
        
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item { color: #64748b; transition: 0.3s; cursor: pointer; text-align: center; flex: 1; text-decoration: none; }
        .nav-item.active { color: var(--accent); }

        .exclusive-offer {
            background: linear-gradient(135deg, #064e3b 0%, #10b981 100%);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
            position: relative; overflow: hidden;
        }

        .animate-marquee { display: inline-block; white-space: nowrap; animation: marquee 35s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        
        .view-transition { animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #custom-toast {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
            z-index: 5000; display: none; min-width: 200px; text-align: center;
        }

        input { -webkit-appearance: none; border-radius: 1rem; }
    </style>
</head>
<body class="antialiased" onload="initSite()">

    <div id="custom-toast" class="glass px-6 py-3 rounded-2xl shadow-2xl border-emerald-500/50 text-white text-xs font-bold">
        <span id="toast-msg"></span>
    </div>

    <div class="bg-emerald-500 py-1.5 px-4 text-center text-black font-bold text-[10px] fixed top-0 w-full z-[1100] flex justify-between shadow-md">
        <span><i class="fa-solid fa-shield-check"></i> تشفير بيانات آمن 256-bit</span>
        <span>الوكلاء النشطون: <span id="agent-count">2325</span></span>
    </div>

    <nav class="fixed top-7 w-full z-[1000] bg-transparent backdrop-blur-md py-4 px-6 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-2" onclick="location.reload()">
            <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center text-black shadow-lg">
                <i class="fa-solid fa-crown text-lg"></i>
            </div>
            <span class="text-xl font-black text-emerald-500 italic tracking-tighter uppercase">Best Deal</span>
        </div>
        <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl glass flex items-center justify-center transition-all active:scale-90">
            <i id="theme-icon" class="fa-solid fa-moon text-emerald-400"></i>
        </button>
    </nav>

    <main class="pt-28 pb-32">
        <section id="hero-view" class="px-5 view-transition">
            <div class="text-center mt-6 mb-8">
                <h1 class="text-3xl font-black mb-2 leading-tight">نظام الوكالة <span class="text-emerald-500">الذكي</span></h1>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em]">إيداع تلقائي • أرباح لحظية مضمونة</p>
            </div>

            <div class="exclusive-offer p-7 rounded-[2.5rem] mb-8 border border-white/10">
                <div class="flex justify-between items-center mb-5">
                    <span class="bg-black/40 text-white text-[9px] font-black px-4 py-1.5 rounded-full uppercase italic tracking-wider border border-white/10">Limited Offer</span>
                    <i class="fa-solid fa-fire-flame-curved text-orange-400 animate-pulse text-xl"></i>
                </div>
                <h2 class="text-4xl font-black text-white italic">عائد 100%+</h2>
                <p class="text-emerald-500 bg-white/90 inline-block px-2 py-0.5 rounded-md text-[10px] mt-2 font-black">بونص الوكلاء الجدد</p>
                <button onclick="toggleModal('loginModal', true)" class="w-full mt-8 bg-white text-emerald-900 py-4 rounded-2xl font-black text-sm shadow-2xl active:scale-95 transition-all uppercase italic">انضم إلينا الآن</button>
            </div>

            <div class="mb-8 px-1">
                <h2 class="text-sm font-black mb-5 flex items-center gap-2 italic"><i class="fa-solid fa-shield-halved text-emerald-500"></i> بوابات مالية معتمدة</h2>
                <div class="grid grid-cols-4 gap-4">
                    <div class="glass aspect-square rounded-2xl flex flex-col items-center justify-center gap-1.5"><i class="fa-solid fa-money-bill-transfer text-2xl text-emerald-500"></i><span class="text-[8px] font-bold uppercase">هرم</span></div>
                    <div class="glass aspect-square rounded-2xl flex flex-col items-center justify-center gap-1.5"><i class="fa-brands fa-bitcoin text-2xl text-orange-400"></i><span class="text-[8px] font-bold uppercase">USDT</span></div>
                    <div class="glass aspect-square rounded-2xl flex flex-col items-center justify-center gap-1.5"><i class="fa-solid fa-mobile-screen text-2xl text-blue-400"></i><span class="text-[8px] font-bold uppercase">زين</span></div>
                    <div class="glass aspect-square rounded-2xl flex flex-col items-center justify-center gap-1.5"><i class="fa-solid fa-building-columns text-2xl text-purple-400"></i><span class="text-[8px] font-bold uppercase">بنوك</span></div>
                </div>
            </div>
        </section>

        <section id="user-dashboard" class="hidden px-5 view-transition"></section>
    </main>

    <div class="fixed bottom-[75px] w-full bg-black/60 backdrop-blur-xl border-t border-white/5 py-2.5 overflow-hidden z-[900]">
        <div id="live-transactions" class="animate-marquee text-emerald-400 text-[10px] font-bold flex gap-12 italic"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active flex flex-col items-center gap-1" onclick="showView('hero-view', this)"><i class="fa-solid fa-house text-xl"></i><span class="text-[10px] font-bold">الرئيسية</span></div>
        <div class="nav-item flex flex-col items-center gap-1" onclick="checkAuth()"><i class="fa-solid fa-wallet text-xl"></i><span class="text-[10px] font-bold">محفظتي</span></div>
        <a href="https://api.whatsapp.com/send?phone=639553327014" target="_blank" class="nav-item flex flex-col items-center gap-1">
            <i class="fa-brands fa-whatsapp text-xl"></i>
            <span class="text-[10px] font-bold">الدعم</span>
        </a>
    </div>

    <div id="loginModal" class="hidden fixed inset-0 bg-black/95 backdrop-blur-xl z-[2000] flex items-center justify-center p-6">
        <div class="w-full max-w-sm glass rounded-[2.5rem] p-8 relative border-white/10 shadow-2xl">
            <button onclick="toggleModal('loginModal', false)" class="absolute top-6 left-6 text-slate-500 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-2xl"></i></button>
            <div class="text-center mb-10">
                <h3 id="auth-title" class="text-3xl font-black text-emerald-500 italic mb-2 uppercase tracking-tighter">تسجيل الدخول</h3>
                <p id="auth-desc" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest italic">الوصول الآمن للوكلاء</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="un" placeholder="اسم المستخدم" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white outline-none focus:border-emerald-500 transition-all text-right text-sm">
                <input type="password" id="pw" placeholder="كلمة المرور" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white outline-none focus:border-emerald-500 transition-all text-right text-sm">
                
                <button id="auth-main-btn" onclick="handleAuthAction(event)" class="w-full py-5 bg-emerald-500 text-black font-black rounded-2xl shadow-xl active:scale-95 transition-all uppercase italic text-sm mt-4">دخول المنصة</button>
                
                <div class="text-center mt-4">
                    <button id="toggle-auth-btn" onclick="toggleAuthMode(event)" class="text-emerald-400 text-[10px] font-bold uppercase tracking-widest hover:underline py-2">ليس لديك حساب؟ إنشاء حساب جديد</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const users = {
            "abdo": { name: "عبدو", pw: "25002500", balance: 2000, profit: 1500, level: "فضي" },
            "ghazal": { name: "أحمد بكور", pw: "15001500", balance: 3500, profit: 1250, level: "ذهبي" },
            "muhmmad": { name: "محمد", pw: "20002000", balance: 1000, profit: 750, level: "برونزي" }
        };

        let currentUser = null;
        let isLoginView = true;

        function showToast(msg) {
            const toast = document.getElementById('custom-toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function toggleAuthMode(e) {
            if(e) e.preventDefault();
            isLoginView = !isLoginView;
            const title = document.getElementById('auth-title'), desc = document.getElementById('auth-desc'), 
                  mainBtn = document.getElementById('auth-main-btn'), toggleBtn = document.getElementById('toggle-auth-btn');
            
            if(isLoginView) {
                title.innerText = "تسجيل الدخول"; desc.innerText = "الوصول الآمن للوكلاء";
                mainBtn.innerText = "دخول المنصة";
                toggleBtn.innerText = "ليس لديك حساب؟ إنشاء حساب جديد";
            } else {
                title.innerText = "حساب جديد"; desc.innerText = "انضم الآن إلى عائلة Best Deal";
                mainBtn.innerText = "إنشاء الحساب";
                toggleBtn.innerText = "لديك حساب بالفعل؟ سجل دخولك";
            }
        }

        function handleAuthAction(e) {
            if(e) e.preventDefault();
            if(isLoginView) handleLogin();
            else handleRegister();
        }

        function handleRegister() {
            const un = document.getElementById('un').value.trim().toLowerCase(), pw = document.getElementById('pw').value.trim();
            if(!un || !pw) { showToast("يرجى إدخال البيانات كاملة"); return; }
            if(users[un]) { showToast("اسم المستخدم موجود مسبقاً"); return; }
            
            users[un] = { name: un, pw: pw, balance: 0, profit: 0, level: "مبتدئ" };
            showToast("تم إنشاء الحساب بنجاح! يمكنك الدخول");
            toggleAuthMode();
        }

        function handleLogin() {
            const un = document.getElementById('un').value.trim().toLowerCase(), pw = document.getElementById('pw').value.trim();
            if (users[un] && users[un].pw === pw) {
                currentUser = users[un]; toggleModal('loginModal', false);
                renderDashboard(); showView('user-dashboard');
                showToast(`مرحباً، ${currentUser.name}`);
            } else { showToast("خطأ في البيانات، حاول مجدداً"); }
        }

        function renderDashboard() {
            const total = currentUser.balance + currentUser.profit;
            document.getElementById('user-dashboard').innerHTML = `
                <div class="bg-gradient-to-br from-emerald-900 via-black to-black p-8 rounded-[2.5rem] border border-emerald-500/30 mb-6 relative shadow-2xl">
                    <div class="flex justify-between items-start mb-10">
                        <div><p class="text-emerald-400 text-[10px] font-black uppercase mb-1 italic tracking-widest">الرصيد الكلي</p><h2 class="text-5xl font-black italic text-white">$${total}</h2></div>
                        <div class="glass w-10 h-10 rounded-xl flex items-center justify-center text-emerald-400"><i class="fa-solid fa-user-gear"></i></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <button class="bg-emerald-500 text-black py-4 rounded-2xl font-black text-[11px] uppercase italic">إيداع</button>
                        <button class="bg-white/10 text-white py-4 rounded-2xl font-black text-[11px] uppercase italic">سحب</button>
                    </div>
                </div>
            `;
        }

        function checkAuth() { if(!currentUser) toggleModal('loginModal', true); else showView('user-dashboard'); }
        function showView(v, el) { 
            document.getElementById('hero-view').classList.add('hidden'); document.getElementById('user-dashboard').classList.add('hidden'); 
            document.getElementById(v).classList.remove('hidden');
            if(el) { document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
        }
        function toggleModal(id, s) { const m = document.getElementById(id); s ? m.classList.remove('hidden') : m.classList.add('hidden'); }
        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function initSite() { 
            const container = document.getElementById('live-transactions');
            let content = '<span class="flex items-center gap-2"><i class="fa-solid fa-circle-check text-emerald-500"></i> سحب بقيمة <span class="text-white">$450</span> عبر USDT (دمشق)</span>';
            container.innerHTML = content.repeat(10);
        }
        let agents = 2325;
        setInterval(() => { agents += (Math.floor(Math.random()*5)-2); document.getElementById('agent-count').innerText = agents; }, 3000);
    </script>
</body>
</html>
