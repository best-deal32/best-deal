<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Best Deal | ذاكرة ذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap');
        :root { --bg: #020617; --accent: #10b981; }
        body { font-family: 'IBM Plex Sans Arabic', sans-serif; background: var(--bg); color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255,255,255,0.02); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.1); display: flex; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #64748b; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: var(--accent); }
        .wheel-spin { animation: fast-spin 0.3s linear infinite; }
        @keyframes fast-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased">

    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 z-[5000] hidden glass px-6 py-4 rounded-2xl border-emerald-500/30 shadow-2xl text-[11px] font-black text-white text-center min-w-[280px] animate-up">
        <span id="toast-msg"></span>
    </div>

    <nav class="fixed top-0 w-full z-[1000] glass py-4 px-6 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="w-9 h-9 bg-emerald-500 rounded-lg flex items-center justify-center text-black shadow-lg"><i class="fa-solid fa-bolt text-sm"></i></div>
            <span class="text-lg font-black text-emerald-500 italic uppercase">Best Deal</span>
        </div>
        <div class="text-[8px] font-bold text-slate-500 uppercase">Status: <span class="text-emerald-500">Cloud Storage On</span></div>
    </nav>

    <main class="pt-24 pb-32">
        <section id="hero-view" class="px-5 animate-up">
            <div class="bg-gradient-to-br from-emerald-600 to-black p-8 rounded-[2.5rem] mb-6 shadow-2xl relative overflow-hidden border border-white/5">
                <h2 class="text-3xl font-black italic mb-2">منصة الوكلاء</h2>
                <p class="text-[9px] font-bold opacity-60 uppercase mb-8 italic">البيانات محفوظة تلقائياً على هاتفك</p>
                <button onclick="toggleModal('loginModal', true)" class="w-full bg-white text-emerald-950 py-4 rounded-2xl font-black text-xs uppercase italic active:scale-95 transition-all shadow-xl">تسجيل الدخول</button>
            </div>
        </section>
        <section id="dashboard-view" class="hidden px-5 animate-up"></section>
    </main>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showHero()"><i class="fa-solid fa-house-chimney text-xl mb-1"></i><span>الرئيسية</span></div>
        <div class="nav-item" onclick="checkAuth()"><i class="fa-solid fa-wallet text-xl mb-1"></i><span>محفظتي</span></div>
        <a href="https://wa.me/639553327014" target="_blank" class="nav-item no-underline"><i class="fa-brands fa-whatsapp text-xl mb-1 text-emerald-500"></i><span>الدعم</span></a>
    </div>

    <div id="loginModal" class="hidden fixed inset-0 bg-black/95 z-[2000] flex items-center justify-center p-6 backdrop-blur-3xl">
        <div class="w-full max-w-sm glass rounded-[3rem] p-8 relative border-emerald-500/20">
            <button onclick="toggleModal('loginModal', false)" class="absolute top-6 left-6 text-slate-500"><i class="fa-solid fa-xmark text-xl"></i></button>
            <div class="text-center mb-10"><h3 class="text-2xl font-black text-emerald-500 italic uppercase">Login</h3></div>
            <div class="space-y-4">
                <input type="text" id="un" placeholder="اسم المستخدم" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white outline-none focus:border-emerald-500 text-sm">
                <input type="password" id="pw" placeholder="كلمة المرور" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white outline-none focus:border-emerald-500 text-sm">
                <button onclick="handleLogin()" class="w-full py-5 bg-emerald-500 text-black font-black rounded-2xl text-xs uppercase shadow-xl active:scale-95 transition-all">فتح المحفظة</button>
            </div>
        </div>
    </div>

    <div id="depositModal" class="hidden fixed inset-0 bg-black/98 z-[3000] flex items-center justify-center p-6 backdrop-blur-2xl">
        <div class="w-full max-w-sm glass rounded-[3rem] p-9 relative border-emerald-500/20 shadow-2xl animate-up">
            <button onclick="toggleModal('depositModal', false)" class="absolute top-6 left-6 text-slate-500"><i class="fa-solid fa-xmark text-xl"></i></button>
            <div class="text-center mb-8">
                <h3 class="text-xl font-black text-white italic tracking-tighter">إيداع رصيد (مراجعة)</h3>
            </div>
            <div class="space-y-5">
                <input type="number" id="dep-val" placeholder="المبلغ ($)" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-5 text-white outline-none focus:border-emerald-500 text-center font-black text-xl">
                <label id="up-box" class="block w-full bg-white/5 border-2 border-dashed border-white/10 py-8 rounded-2xl text-center cursor-pointer active:bg-emerald-500/5 transition-all">
                    <input type="file" id="dep-img" class="hidden" onchange="checkFile()">
                    <div id="up-state">
                        <i class="fa-solid fa-camera-retro text-2xl text-slate-600 mb-2"></i>
                        <p class="text-[9px] text-slate-500 font-black uppercase">ارفق لقطة الشاشة</p>
                    </div>
                </label>
                <button onclick="confirmNewDep()" class="w-full bg-emerald-500 py-5 rounded-2xl text-black font-black text-xs uppercase shadow-xl active:scale-95 transition-all">تأكيد الإرسال</button>
            </div>
        </div>
    </div>

    <script>
        // قاعدة البيانات الافتراضية
        let users = {
            "abdo": { name: "Abdul Ghani Ghannoum", pw: "25002500", balance: 2000, profit: 1500, history: [] },
            "ghazal": { name: "أحمد بكور", pw: "15001500", balance: 3500, profit: 1250, history: [] },
            "muhmmad": { name: "محمد", pw: "20002000", balance: 1000, profit: 750, history: [] },
            "oday": { name: "عدي", pw: "65006500", balance: 1000, profit: 750, history: [] }
        };

        let currentUser = null;

        // --- وظائف الحفظ السحابي المحلي ---
        function saveToPhone() {
            localStorage.setItem('best_deal_users', JSON.stringify(users));
        }

        function loadFromPhone() {
            const savedData = localStorage.getItem('best_deal_users');
            if (savedData) {
                users = JSON.parse(savedData);
            }
        }

        // استدعاء التحميل عند فتح الموقع
        loadFromPhone();

        function showToast(m) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = m;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3000);
        }

        function toggleModal(id, s) { document.getElementById(id).classList.toggle('hidden', !s); }

        function handleLogin() {
            const u = document.getElementById('un').value.trim().toLowerCase();
            const p = document.getElementById('pw').value.trim();
            if (users[u] && users[u].pw === p) {
                currentUser = users[u];
                toggleModal('loginModal', false);
                renderDash();
                showView('dashboard-view');
            } else { showToast("خطأ في البيانات"); }
        }

        function checkFile() {
            const f = document.getElementById('dep-img');
            const s = document.getElementById('up-state');
            if (f.files[0]) { s.innerHTML = `<i class="fa-solid fa-check-double text-2xl text-emerald-500 mb-2"></i><p class="text-[9px] text-emerald-500 font-black">جاهز للرفع</p>`; }
        }

        function confirmNewDep() {
            const val = document.getElementById('dep-val').value;
            const img = document.getElementById('dep-img').files[0];
            if (!val || val <= 0 || !img) return showToast("أكمل البيانات المطلوبة");

            const time = new Date().getHours() + ":" + new Date().getMinutes();
            currentUser.history.unshift({
                title: "إيداع (قيد المراجعة)",
                amount: `$${parseFloat(val).toLocaleString()}`,
                status: "text-amber-400",
                icon: "fa-solid fa-clock-rotate-left animate-pulse",
                time: time
            });

            saveToPhone(); // حفظ البيانات على الهاتف فوراً
            showToast("تم الحفظ وإرسال الطلب للمراجعة");
            renderDash();
            toggleModal('depositModal', false);
        }

        function spin() {
            const bet = parseFloat(document.getElementById('bet').value);
            if (!bet || bet < 10) return showToast("الحد الأدنى 10$");
            if (currentUser.balance < bet) return showToast("رصيدك غير كافٍ");

            const btn = document.getElementById('spin-btn');
            const ico = document.getElementById('wheel-ico');
            btn.disabled = true; ico.classList.add('wheel-spin');

            setTimeout(() => {
                ico.classList.remove('wheel-spin');
                btn.disabled = false;
                const win = Math.random() > 0.65;
                const time = new Date().getHours() + ":" + new Date().getMinutes();
                
                if (win) {
                    currentUser.balance += bet;
                    currentUser.history.unshift({ title: "ربح عجلة الحظ", amount: `+$${bet}`, status: "text-emerald-400", icon: "fa-solid fa-circle-check", time });
                    showToast("مبروك! تم تحديث رصيدك وحفظه");
                } else {
                    currentUser.balance -= bet;
                    currentUser.history.unshift({ title: "خسارة عجلة الحظ", amount: `-$${bet}`, status: "text-red-500", icon: "fa-solid fa-circle-xmark", time });
                    showToast("حظ أوفر المرة القادمة");
                }
                saveToPhone(); // حفظ النتيجة على الهاتف فوراً
                renderDash();
            }, 1800);
        }

        function renderDash() {
            let logs = currentUser.history.map(h => `
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/5 mb-2 animate-up">
                    <div class="flex items-center gap-3">
                        <i class="${h.icon} ${h.status} text-lg"></i>
                        <div><p class="text-[10px] font-bold">${h.title}</p><p class="text-[8px] text-slate-500">${h.time}</p></div>
                    </div>
                    <span class="text-xs font-black ${h.status}">${h.amount}</span>
                </div>
            `).join('');

            document.getElementById('dashboard-view').innerHTML = `
                <div class="bg-gradient-to-br from-slate-900 to-black p-8 rounded-[2.5rem] border border-white/10 mb-6 shadow-2xl">
                    <p class="text-emerald-500 text-[10px] font-black uppercase mb-1 tracking-widest italic">الرصيد المحفوظ على هاتفك</p>
                    <h2 class="text-4xl font-black italic text-white mb-8 tracking-tighter">$${(currentUser.balance + currentUser.profit).toLocaleString()}</h2>
                    <div class="flex gap-3">
                        <button onclick="toggleModal('depositModal', true)" class="flex-1 bg-emerald-500 text-black py-4 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-emerald-500/20 active:scale-95 transition-all">إيداع</button>
                        <button onclick="showToast('السحب متوقف حالياً')" class="flex-1 bg-white/5 text-white border border-white/10 py-4 rounded-2xl font-black text-[10px] uppercase italic">سحب</button>
                    </div>
                </div>

                <div class="glass p-6 rounded-[2.5rem] mb-6 text-center">
                    <div id="wheel-ico" class="w-16 h-16 bg-emerald-500/5 rounded-full border border-emerald-500/20 mx-auto flex items-center justify-center mb-4"><i class="fa-solid fa-dharmachakra text-2xl text-emerald-500"></i></div>
                    <div class="flex gap-2">
                        <input type="number" id="bet" placeholder="الرهان" class="w-1/2 bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white text-[10px] outline-none text-center font-bold">
                        <button id="spin-btn" onclick="spin()" class="w-1/2 bg-emerald-500 text-black font-black py-3 rounded-xl text-[9px] uppercase active:scale-95 transition-all">لعب الآن</button>
                    </div>
                </div>

                <h3 class="text-[10px] font-black uppercase italic mb-4 text-slate-500 flex items-center gap-2"><i class="fa-solid fa-save text-emerald-500"></i> السجل المحفوظ لـ ${currentUser.name}</h3>
                <div class="max-h-64 overflow-y-auto no-scrollbar">
                    ${logs || '<p class="text-center text-[9px] text-slate-700 py-6 font-bold italic">لا توجد عمليات</p>'}
                </div>
            `;
        }

        function showHero() { showView('hero-view'); document.querySelectorAll('.nav-item').forEach((n,i) => n.classList.toggle('active', i===0)); }
        function checkAuth() { if(!currentUser) toggleModal('loginModal', true); else { showView('dashboard-view'); renderDash(); } }
        function showView(id) { document.getElementById('hero-view').classList.add('hidden'); document.getElementById('dashboard-view').classList.add('hidden'); document.getElementById(id).classList.remove('hidden'); }
    </script>
</body>
</html>
