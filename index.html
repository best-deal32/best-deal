<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Best Deal Mobile | المنصة السحابية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap');
        :root { --bg: #020617; --card: rgba(255,255,255,0.03); --text: #f8fafc; --accent: #10b981; }
        body { font-family: 'IBM Plex Sans Arabic', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: rgba(0,0,0,0.95); display: flex; z-index: 1000; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { color: #64748b; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-decoration: none; }
        .nav-item.active { color: var(--accent); }
        .exclusive-offer { background: linear-gradient(135deg, #064e3b 0%, #10b981 100%); }
        .view-transition { animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        #custom-toast { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); z-index: 5000; display: none; }
    </style>
</head>
<body onload="initApp()">

    <div id="custom-toast" class="glass px-6 py-3 rounded-2xl shadow-2xl border-emerald-500/50 text-white text-xs font-bold">
        <span id="toast-msg"></span>
    </div>

    <nav class="fixed top-0 w-full z-[1000] bg-slate-950/50 backdrop-blur-md py-4 px-6 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center text-black shadow-lg"><i class="fa-solid fa-crown"></i></div>
            <span class="text-xl font-black text-emerald-500 uppercase">Best Deal</span>
        </div>
        <div id="agent-online" class="text-[10px] text-emerald-400 font-bold bg-emerald-500/10 px-3 py-1 rounded-full italic">متصل الآن</div>
    </nav>

    <main class="pt-24 pb-32">
        <section id="hero-view" class="px-5 view-transition">
            <div class="exclusive-offer p-8 rounded-[2.5rem] mb-8 text-center">
                <h2 class="text-3xl font-black text-white italic mb-4">نظام الوكلاء العالمي</h2>
                <p class="text-white/80 text-xs mb-6">ابدأ الآن واحفظ أرباحك في سحابة Best Deal الآمنة</p>
                <button onclick="checkAuth()" class="w-full bg-white text-emerald-900 py-4 rounded-2xl font-black shadow-xl active:scale-95 transition-all">فتح المحفظة السحابية</button>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="glass p-5 rounded-2xl text-center"><i class="fa-solid fa-server text-emerald-500 mb-2"></i><p class="text-[10px] font-bold">تزامن سحابي</p></div>
                <div class="glass p-5 rounded-2xl text-center"><i class="fa-solid fa-mobile-screen text-emerald-500 mb-2"></i><p class="text-[10px] font-bold">دعم كافة الأجهزة</p></div>
            </div>
        </section>

        <section id="user-dashboard" class="hidden px-5 view-transition"></section>
    </main>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showView('hero-view', this)"><i class="fa-solid fa-house"></i><span class="text-[10px]">الرئيسية</span></div>
        <div class="nav-item" onclick="checkAuth()"><i class="fa-solid fa-wallet"></i><span class="text-[10px]">محفظتي</span></div>
        <a href="https://api.whatsapp.com/send?phone=639553327014" target="_blank" class="nav-item"><i class="fa-brands fa-whatsapp"></i><span class="text-[10px]">الدعم</span></a>
    </div>

    <div id="loginModal" class="hidden fixed inset-0 bg-black/95 z-[2000] flex items-center justify-center p-6">
        <div class="w-full max-w-sm glass rounded-[2.5rem] p-8 relative">
            <button onclick="toggleModal('loginModal', false)" class="absolute top-6 left-6 text-slate-500"><i class="fa-solid fa-xmark text-2xl"></i></button>
            <div class="text-center mb-10">
                <h3 id="auth-title" class="text-2xl font-black text-emerald-500 uppercase">تسجيل الدخول</h3>
                <p id="auth-desc" class="text-[10px] text-slate-500 mt-2">بياناتك محفوظة سحابياً وتعمل على أي جهاز</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="un" placeholder="اسم المستخدم" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white outline-none focus:border-emerald-500 text-right">
                <input type="password" id="pw" placeholder="كلمة المرور" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white outline-none focus:border-emerald-500 text-right">
                <button id="auth-btn" onclick="handleAuth()" class="w-full py-5 bg-emerald-500 text-black font-black rounded-2xl active:scale-95 transition-all italic">دخول المنصة</button>
                <button onclick="toggleAuthMode()" id="toggle-btn" class="w-full text-emerald-400 text-[10px] font-bold mt-2">ليس لديك حساب؟ إنشاء حساب جديد</button>
            </div>
        </div>
    </div>

    <script>
        // إعداد Firebase (قاعدة بيانات تجريبية)
        // ملاحظة: للاستخدام الفعلي، يفضل إنشاء حساب Firebase خاص بك ووضع الـ Config هنا
        const firebaseConfig = {
            databaseURL: "https://best-deal-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentUser = null;
        let isLoginMode = true;

        function showToast(msg) {
            const t = document.getElementById('custom-toast');
            document.getElementById('toast-msg').innerText = msg;
            t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000);
        }

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "تسجيل الدخول" : "حساب سحابي جديد";
            document.getElementById('auth-btn').innerText = isLoginMode ? "دخول المنصة" : "إنشاء وحفظ الحساب";
            document.getElementById('toggle-btn').innerText = isLoginMode ? "ليس لديك حساب؟ إنشاء حساب جديد" : "لديك حساب؟ سجل دخولك";
        }

        function handleAuth() {
            const un = document.getElementById('un').value.trim().toLowerCase();
            const pw = document.getElementById('pw').value.trim();
            if(!un || !pw) return showToast("أكمل البيانات");

            if(isLoginMode) {
                // البحث في قاعدة البيانات السحابية
                database.ref('users/' + un).once('value').then((snapshot) => {
                    const data = snapshot.val();
                    if(data && data.pw === pw) {
                        currentUser = data;
                        loginSuccess();
                    } else {
                        showToast("بيانات خاطئة أو الحساب غير موجود");
                    }
                });
            } else {
                // إنشاء حساب جديد في السحابة
                database.ref('users/' + un).once('value').then((snapshot) => {
                    if(snapshot.exists()) return showToast("اسم المستخدم محجوز");
                    
                    const newUser = {
                        un: un, pw: pw, name: un,
                        balance: 0, profit: 0, level: "جديد"
                    };
                    database.ref('users/' + un).set(newUser).then(() => {
                        showToast("تم الحساب سحابياً! يمكنك الدخول الآن");
                        toggleAuthMode();
                    });
                });
            }
        }

        function loginSuccess() {
            toggleModal('loginModal', false);
            renderDashboard();
            showView('user-dashboard');
            showToast("تمت المزامنة السحابية بنجاح");
        }

        function renderDashboard() {
            const total = currentUser.balance + currentUser.profit;
            document.getElementById('user-dashboard').innerHTML = `
                <div class="bg-gradient-to-br from-emerald-900 to-black p-8 rounded-[2.5rem] border border-emerald-500/30 mb-6">
                    <p class="text-emerald-400 text-[10px] font-black italic">الرصيد السحابي المتاح</p>
                    <h2 class="text-5xl font-black italic text-white mb-6">$${total}</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <button class="bg-emerald-500 text-black py-4 rounded-2xl font-black text-xs uppercase italic">إيداع</button>
                        <button class="bg-white/10 text-white py-4 rounded-2xl font-black text-xs uppercase italic">سحب</button>
                    </div>
                </div>
                <div class="glass p-6 rounded-2xl mb-4">
                    <div class="flex justify-between items-center opacity-70">
                        <span class="text-xs">حالة الحساب:</span>
                        <span class="text-xs text-emerald-400 font-bold">نشط (متزامن)</span>
                    </div>
                </div>
                <button onclick="location.reload()" class="w-full py-4 text-slate-500 text-[10px] font-bold">تسجيل الخروج</button>
            `;
        }

        function showView(v, el) {
            document.getElementById('hero-view').classList.add('hidden');
            document.getElementById('user-dashboard').classList.add('hidden');
            document.getElementById(v).classList.remove('hidden');
            if(el) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
        }

        function checkAuth() { if(!currentUser) toggleModal('loginModal', true); else showView('user-dashboard'); }
        function toggleModal(id, s) { document.getElementById(id).classList.toggle('hidden', !s); }
        function initApp() { 
            // إضافة المستخدمين الافتراضيين للسحابة إذا لم يكونوا موجودين
            const defaults = {
                "abdo": { un: "abdo", pw: "25002500", balance: 2000, profit: 1500 },
                "ghazal": { un: "ghazal", pw: "15001500", balance: 3500, profit: 1250 },
                "muhmmad": { un: "muhmmad", pw: "20002000", balance: 1000, profit: 750 }
            };
            Object.keys(defaults).forEach(k => {
                database.ref('users/' + k).once('value').then(s => { if(!s.exists()) database.ref('users/'+k).set(defaults[k]); });
            });
        }
    </script>
</body>
</html>
