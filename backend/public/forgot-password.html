<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>استعادة كلمة المرور | النظام الملكي - Best Deal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800;900&display=swap');
        
        :root {
            --gold-light: #f7e08a;
            --gold-main: #d4af37;
            --gold-dark: #8a6d3b;
            --black-bg: #05070a;
            --card-glass: rgba(15, 23, 42, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--black-bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(212, 175, 55, 0.08) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: #ffffff;
            overflow-x: hidden;
        }

        .forgot-card {
            background: var(--card-glass);
            border: 2px solid rgba(212, 175, 55, 0.25);
            padding: 2rem;
            border-radius: 3rem;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9), 0 0 40px rgba(212, 175, 55, 0.1);
            backdrop-filter: blur(20px);
            animation: slideUpFade 0.8s ease;
        }

        @media (min-width: 768px) {
            .forgot-card {
                padding: 3rem;
            }
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gold-gradient-text {
            background: linear-gradient(135deg, var(--gold-light), var(--gold-main), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 2rem;
        }

        .input-wrapper i {
            position: absolute;
            right: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold-main);
            font-size: 1.2rem;
        }

        .form-input {
            width: 100%;
            padding: 1.2rem 3rem 1.2rem 1.5rem;
            background: rgba(0, 0, 0, 0.6);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.2rem;
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            outline: none;
            transition: all 0.4s;
        }

        .form-input:focus {
            border-color: var(--gold-main);
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .gold-btn {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, var(--gold-main), #8a6d3b);
            border: none;
            border-radius: 1.2rem;
            color: #000;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 0.5rem;
        }

        .gold-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .gold-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .back-link {
            display: inline-block;
            margin-top: 1.8rem;
            color: var(--gold-main);
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .back-link:hover {
            text-decoration: underline;
        }

        .info-note {
            background: rgba(212, 175, 55, 0.1);
            border-radius: 1rem;
            padding: 0.8rem;
            text-align: center;
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 1.5rem;
        }

        /* Language Switcher */
        .lang-selector {
            background: rgba(0,0,0,0.4);
            border-radius: 2rem;
            padding: 0.25rem;
            display: inline-flex;
            gap: 0.25rem;
            border: 1px solid rgba(212,175,55,0.3);
            margin-bottom: 1rem;
        }
        .lang-option {
            padding: 0.3rem 0.7rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            color: #94a3b8;
        }
        .lang-option.active {
            background: linear-gradient(135deg, #d4af37, #8a6d3b);
            color: #000;
        }
        .lang-option:hover:not(.active) {
            background: rgba(212,175,55,0.2);
            color: #f7e08a;
        }
    </style>
</head>
<body>
    <div class="forgot-card">
        <div class="flex justify-between items-center mb-4">
            <div></div>
            <div class="lang-selector">
                <div class="lang-option active" data-lang="ar">العربية</div>
                <div class="lang-option" data-lang="en">English</div>
                <div class="lang-option" data-lang="zh">中文</div>
                <div class="lang-option" data-lang="de">Deutsch</div>
            </div>
        </div>

        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gold-main/10 border-2 border-gold-main mb-4">
                <i class="fa-solid fa-key text-3xl text-[var(--gold-main)]"></i>
            </div>
            <h1 class="text-3xl font-black gold-gradient-text italic" data-i18n="forgot_title">نسيت كلمة المرور</h1>
            <p class="text-slate-400 text-sm mt-2" data-i18n="forgot_subtitle">سنرسل رابطاً إلى بريدك الإلكتروني لإعادة تعيين كلمة المرور</p>
        </div>

        <!-- الخطوة الأولى: إدخال البريد الإلكتروني -->
        <div id="step1" class="step active-step">
            <div class="input-wrapper">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="reset-email" class="form-input" placeholder="البريد الإلكتروني" required>
            </div>
            <button id="sendResetLinkBtn" class="gold-btn">
                <i class="fa-solid fa-paper-plane"></i> <span data-i18n="send_reset_link">إرسال رابط إعادة التعيين</span>
            </button>
        </div>

        <!-- الخطوة الثانية: إدخال الرمز وكلمة المرور الجديدة -->
        <div id="step2" class="step" style="display: none;">
            <div class="input-wrapper">
                <i class="fa-solid fa-key"></i>
                <input type="text" id="reset-token" class="form-input" placeholder="رمز إعادة التعيين (الرابط يحتوي عليه)" required>
            </div>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="new-password" class="form-input" placeholder="كلمة المرور الجديدة" required>
            </div>
            <div class="input-wrapper">
                <i class="fa-solid fa-check-circle"></i>
                <input type="password" id="confirm-password" class="form-input" placeholder="تأكيد كلمة المرور الجديدة" required>
            </div>
            <button id="resetPasswordBtn" class="gold-btn">
                <i class="fa-solid fa-rotate-right"></i> <span data-i18n="reset_password_btn">تغيير كلمة المرور</span>
            </button>
            <button id="backToStep1Btn" class="gold-btn" style="background: #2c3e50; margin-top: 0.5rem;">
                <i class="fa-solid fa-arrow-right"></i> <span data-i18n="back_to_email">العودة إلى إدخال البريد</span>
            </button>
        </div>

        <div class="info-note">
            <i class="fa-solid fa-info-circle ml-1"></i>
            <span data-i18n="dev_note">ملاحظة: في وضع التطوير، سيتم طباعة رابط إعادة التعيين في وحدة تحكم الخادم (Terminal). يمكنك نسخه واستخدامه مباشرة.</span>
        </div>

        <div class="text-center mt-4">
            <a href="login.html" class="back-link">
                <i class="fa-solid fa-arrow-right ml-1"></i> <span data-i18n="back_to_login">العودة إلى تسجيل الدخول</span>
            </a>
        </div>
    </div>

    <script>
        // ============================================================
        // الإعدادات العامة - استخدام المسارات النسبية
        // ============================================================
        const API_BASE_URL = '';
        const URL_FORGOT_PASSWORD = `${API_BASE_URL}/api/auth/forgot-password`;
        const URL_RESET_PASSWORD = `${API_BASE_URL}/api/auth/reset-password`;

        // ============================================================
        // نظام الترجمة متعدد اللغات (i18n)
        // ============================================================
        let currentLang = localStorage.getItem('preferredLanguage') || 'ar';
        const translations = {};

        async function loadTranslations(lang) {
            try {
                const response = await fetch(`/locales/${lang}/translation.json`);
                if (!response.ok) throw new Error();
                const data = await response.json();
                translations[lang] = data;
                return data;
            } catch (err) {
                console.warn(`Failed to load translations for ${lang}, falling back to ar`);
                if (lang !== 'ar') return loadTranslations('ar');
                return {};
            }
        }

        function applyTranslations(lang) {
            const t = translations[lang];
            if (!t) return;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) {
                    el.textContent = t[key];
                }
            });
            // Update placeholders
            const emailInput = document.getElementById('reset-email');
            if (emailInput && t.email_placeholder) emailInput.placeholder = t.email_placeholder;
            const tokenInput = document.getElementById('reset-token');
            if (tokenInput && t.token_placeholder) tokenInput.placeholder = t.token_placeholder;
            const newPassInput = document.getElementById('new-password');
            if (newPassInput && t.new_password_placeholder) newPassInput.placeholder = t.new_password_placeholder;
            const confirmPassInput = document.getElementById('confirm-password');
            if (confirmPassInput && t.confirm_password_placeholder) confirmPassInput.placeholder = t.confirm_password_placeholder;
            // Direction
            const htmlEl = document.documentElement;
            if (lang === 'ar') {
                htmlEl.setAttribute('dir', 'rtl');
                htmlEl.setAttribute('lang', 'ar');
            } else {
                htmlEl.setAttribute('dir', 'ltr');
                htmlEl.setAttribute('lang', lang);
            }
            localStorage.setItem('preferredLanguage', lang);
            currentLang = lang;
            document.querySelectorAll('.lang-option').forEach(opt => {
                if (opt.getAttribute('data-lang') === lang) opt.classList.add('active');
                else opt.classList.remove('active');
            });
            document.cookie = `i18n=${lang}; path=/; max-age=31536000`;
        }

        async function setLanguage(lang) {
            if (!translations[lang]) await loadTranslations(lang);
            applyTranslations(lang);
        }

        document.querySelectorAll('.lang-option').forEach(opt => {
            opt.addEventListener('click', async () => {
                const lang = opt.getAttribute('data-lang');
                if (lang === currentLang) return;
                await setLanguage(lang);
            });
        });

        // ============================================================
        // إرسال رابط إعادة التعيين (الخطوة الأولى)
        // ============================================================
        const sendBtn = document.getElementById('sendResetLinkBtn');
        const emailInput = document.getElementById('reset-email');
        const step1Div = document.getElementById('step1');
        const step2Div = document.getElementById('step2');
        let pendingEmail = null;

        sendBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            if (!email) {
                Swal.fire({
                    icon: 'warning',
                    title: translations[currentLang]?.warning || 'تنبيه',
                    text: translations[currentLang]?.email_required || 'يرجى إدخال بريدك الإلكتروني',
                    background: '#05070a',
                    color: '#fff',
                    confirmButtonColor: '#d4af37'
                });
                return;
            }

            sendBtn.disabled = true;
            const originalText = sendBtn.innerHTML;
            sendBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> ' + (translations[currentLang]?.sending || 'جاري الإرسال...');

            try {
                const response = await fetch(URL_FORGOT_PASSWORD, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                    credentials: 'include'
                });
                const data = await response.json();

                if (response.ok && data.success) {
                    pendingEmail = email;
                    step1Div.style.display = 'none';
                    step2Div.style.display = 'block';
                    Swal.fire({
                        icon: 'success',
                        title: translations[currentLang]?.success || 'تم الإرسال',
                        text: data.message || (translations[currentLang]?.reset_link_sent || 'تم إرسال رابط إعادة التعيين إلى بريدك الإلكتروني'),
                        background: '#05070a',
                        color: '#fff',
                        confirmButtonColor: '#d4af37'
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: translations[currentLang]?.error || 'فشل الإرسال',
                        text: data.message || (translations[currentLang]?.reset_link_failed || 'لم نتمكن من إرسال الرابط، يرجى التأكد من صحة البريد'),
                        background: '#05070a',
                        color: '#fff',
                        confirmButtonColor: '#d4af37'
                    });
                }
            } catch (err) {
                console.error(err);
                Swal.fire({
                    icon: 'error',
                    title: translations[currentLang]?.connection_error_title || 'خطأ في الاتصال',
                    text: translations[currentLang]?.connection_error || 'فشل الاتصال بالخادم، يرجى المحاولة لاحقاً',
                    background: '#05070a',
                    color: '#fff',
                    confirmButtonColor: '#d4af37'
                });
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = originalText;
            }
        });

        // ============================================================
        // إعادة تعيين كلمة المرور (الخطوة الثانية)
        // ============================================================
        const resetBtn = document.getElementById('resetPasswordBtn');
        const tokenInput = document.getElementById('reset-token');
        const newPassInput = document.getElementById('new-password');
        const confirmPassInput = document.getElementById('confirm-password');
        const backToStep1Btn = document.getElementById('backToStep1Btn');

        resetBtn.addEventListener('click', async () => {
            const token = tokenInput.value.trim();
            const newPassword = newPassInput.value;
            const confirmPassword = confirmPassInput.value;

            if (!token) {
                Swal.fire('خطأ', translations[currentLang]?.token_required || 'الرمز مطلوب', 'error');
                return;
            }
            if (!newPassword || !confirmPassword) {
                Swal.fire('خطأ', translations[currentLang]?.password_required || 'كلمة المرور الجديدة وتأكيدها مطلوبة', 'error');
                return;
            }
            if (newPassword !== confirmPassword) {
                Swal.fire('خطأ', translations[currentLang]?.passwords_not_match || 'كلمتا المرور غير متطابقتين', 'error');
                return;
            }
            if (newPassword.length < 6) {
                Swal.fire('خطأ', translations[currentLang]?.password_too_short || 'كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
                return;
            }

            resetBtn.disabled = true;
            const originalText = resetBtn.innerHTML;
            resetBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> ' + (translations[currentLang]?.resetting || 'جاري التغيير...');

            try {
                const response = await fetch(URL_RESET_PASSWORD, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword }),
                    credentials: 'include'
                });
                const data = await response.json();

                if (response.ok && data.success) {
                    Swal.fire({
                        icon: 'success',
                        title: translations[currentLang]?.reset_success_title || 'تم التغيير',
                        text: data.message || (translations[currentLang]?.reset_success_message || 'تم تغيير كلمة المرور بنجاح، يمكنك تسجيل الدخول الآن'),
                        background: '#05070a',
                        color: '#fff',
                        confirmButtonColor: '#d4af37'
                    }).then(() => {
                        window.location.href = 'login.html';
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: translations[currentLang]?.reset_failed_title || 'فشل',
                        text: data.message || (translations[currentLang]?.reset_failed_message || 'الرمز غير صالح أو منتهي الصلاحية'),
                        background: '#05070a',
                        color: '#fff',
                        confirmButtonColor: '#d4af37'
                    });
                }
            } catch (err) {
                console.error(err);
                Swal.fire({
                    icon: 'error',
                    title: translations[currentLang]?.connection_error_title || 'خطأ',
                    text: translations[currentLang]?.connection_error || 'فشل الاتصال بالسيرفر',
                    background: '#05070a',
                    color: '#fff',
                    confirmButtonColor: '#d4af37'
                });
            } finally {
                resetBtn.disabled = false;
                resetBtn.innerHTML = originalText;
            }
        });

        backToStep1Btn.addEventListener('click', () => {
            step2Div.style.display = 'none';
            step1Div.style.display = 'block';
            // Clear fields
            tokenInput.value = '';
            newPassInput.value = '';
            confirmPassInput.value = '';
        });

        // ============================================================
        // التحميل الأولي للترجمات
        // ============================================================
        window.onload = async () => {
            await loadTranslations(currentLang);
            applyTranslations(currentLang);
        };
    </script>
</body>
</html>
