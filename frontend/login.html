<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>تسجيل الدخول | النظام الملكي - Best Deal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800;900&display=swap');
        
        :root {
            --gold-light: #f7e08a;
            --gold-main: #d4af37;
            --gold-dark: #8a6d3b;
            --black-bg: #05070a;
            --card-bg: rgba(15, 23, 42, 0.98);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: radial-gradient(circle at top center, #111b27 0%, var(--black-bg) 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .bg-glow-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .glow-circle-1 {
            position: absolute;
            top: -150px;
            left: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            animation: pulse-glow 8s infinite alternate;
        }

        .glow-circle-2 {
            position: absolute;
            bottom: -150px;
            right: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(60px);
            animation: pulse-glow 12s infinite alternate-reverse;
        }

        @keyframes pulse-glow {
            0% { transform: scale(1) translate(0, 0); opacity: 0.5; }
            100% { transform: scale(1.2) translate(20px, 20px); opacity: 0.8; }
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 32px;
            width: 90%;
            max-width: 440px;
            padding: 50px 40px;
            position: relative;
            z-index: 10;
            animation: slideUpFade 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .login-card:hover {
            border-color: rgba(212, 175, 55, 0.4);
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon-wrapper {
            display: inline-flex;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(212,175,55,0.1), rgba(0,0,0,0.5));
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo-icon-wrapper i {
            font-size: 2.5rem;
            color: var(--gold-main);
        }

        .header-section h1 {
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--gold-light);
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold-main);
            font-size: 1.1rem;
        }

        .input-field {
            width: 100%;
            padding: 16px 52px 16px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .input-field:focus {
            border-color: var(--gold-main);
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
        }

        .submit-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--gold-main), var(--gold-dark));
            border: none;
            border-radius: 16px;
            color: #000;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .submit-button:hover:not(:disabled) {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .submit-button:disabled {
            background: #2a2a2a;
            color: #555;
            cursor: not-allowed;
        }

        .footer-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 35px;
            text-align: center;
        }

        .footer-links a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.95rem;
        }

        .footer-links a span {
            color: var(--gold-main);
            font-weight: 700;
        }

        .forgot-pass {
            color: var(--gold-light) !important;
        }
    </style>
</head>
<body>
    <div class="bg-glow-container">
        <div class="glow-circle-1"></div>
        <div class="glow-circle-2"></div>
    </div>

    <div class="login-card">
        <div class="header-section">
            <div class="logo-icon-wrapper">
                <i class="fa-solid fa-crown"></i>
            </div>
            <h1>النظام الملكي</h1>
            <p>سجل دخولك للوصول إلى منصة Best Deal</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>اسم المستخدم</label>
                <div class="input-wrapper">
                    <input type="text" id="username" class="input-field" placeholder="أدخل اسم المستخدم" required>
                    <i class="fa-solid fa-user-shield"></i>
                </div>
            </div>
            <div class="input-group">
                <label>كلمة المرور</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="input-field" placeholder="••••••••" required>
                    <i class="fa-solid fa-key"></i>
                </div>
            </div>
            <button type="submit" id="submitBtn" class="submit-button">
                <span>تسجيل الدخول</span>
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </form>

        <div class="footer-links">
            <a href="forgot-password.html" class="forgot-pass">نسيت كلمة المرور؟</a>
            <a href="register.html">ليس لديك حساب؟ <span>أنشئ حساباً جديداً</span></a>
        </div>
    </div>

    <script>
        // ============================================================
        // 1. الإعدادات العامة (لا نحتاج CSRF مع السيرفر الجديد)
        // ============================================================
        const API_BASE_URL = 'http://localhost:5000';
        const LOGIN_ENDPOINT = `${API_BASE_URL}/api/users/login`;
        const USER_ME_ENDPOINT = `${API_BASE_URL}/api/users/me`;

        // ============================================================
        // 2. التحقق من وجود جلسة نشطة (توجيه تلقائي إلى dashboard)
        // ============================================================
        async function checkExistingSession() {
            try {
                const response = await fetch(USER_ME_ENDPOINT, {
                    credentials: 'include'
                });
                if (response.ok) {
                    const user = await response.json();
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                console.log('No active session');
            }
        }

        // ============================================================
        // 3. معالجة نموذج تسجيل الدخول
        // ============================================================
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                Swal.fire({
                    icon: 'warning',
                    title: 'تنبيه',
                    text: 'يرجى إدخال اسم المستخدم وكلمة المرور',
                    background: '#05070a',
                    color: '#fff',
                    confirmButtonColor: '#d4af37'
                });
                return;
            }

            // تعطيل الزر أثناء الإرسال
            submitBtn.disabled = true;
            const originalContent = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> <span>جاري التحقق...</span>';

            try {
                const response = await fetch(LOGIN_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password }),
                    credentials: 'include'
                });

                const data = await response.json();

                // حالة قفل الحساب (423)
                if (response.status === 423) {
                    Swal.fire({
                        icon: 'warning',
                        title: 'الحساب مقفل مؤقتاً',
                        text: data.message || 'تم قفل الحساب بسبب كثرة المحاولات الفاشلة، حاول لاحقاً',
                        background: '#05070a',
                        color: '#fff',
                        confirmButtonColor: '#d4af37'
                    });
                    return;
                }

                if (!response.ok || !data.success) {
                    throw new Error(data.message || 'فشل تسجيل الدخول');
                }

                // تسجيل الدخول العادي
                if (data.user) {
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    Swal.fire({
                        title: 'تم الدخول',
                        text: `مرحباً ${data.user.fullName || data.user.username}`,
                        icon: 'success',
                        timer: 1500,
                        showConfirmButton: false,
                        background: '#05070a',
                        color: '#fff'
                    }).then(() => {
                        window.location.href = 'dashboard.html';
                    });
                } else {
                    throw new Error('لم يتم استلام بيانات المستخدم');
                }

            } catch (err) {
                console.error(err);
                let errorMsg = err.message;
                if (errorMsg.includes('فشل') || errorMsg.includes('بيانات')) {
                    errorMsg = 'اسم المستخدم أو كلمة المرور غير صحيحة';
                }
                Swal.fire({
                    icon: 'error',
                    title: 'خطأ',
                    text: errorMsg,
                    background: '#05070a',
                    color: '#fff',
                    confirmButtonColor: '#d4af37'
                });
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalContent;
            }
        });

        // ============================================================
        // 4. دعم اختصار Enter
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (document.activeElement !== submitBtn) {
                    loginForm.requestSubmit();
                }
            }
        });

        // ============================================================
        // 5. التحقق من الجلسة عند تحميل الصفحة
        // ============================================================
        checkExistingSession();
    </script>
</body>
</html>
