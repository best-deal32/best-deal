<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور | النظام الملكي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800;900&display=swap');
        
        :root {
            --gold-light: #f7e08a;
            --gold-main: #d4af37;
            --gold-dark: #8a6d3b;
            --black-bg: #05070a;
            --card-glass: rgba(15, 23, 42, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--black-bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(212, 175, 55, 0.08) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: #ffffff;
        }

        .forgot-card {
            background: var(--card-glass);
            border: 2px solid rgba(212, 175, 55, 0.25);
            padding: 3rem;
            border-radius: 3rem;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9), 0 0 40px rgba(212, 175, 55, 0.1);
            backdrop-filter: blur(20px);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gold-gradient-text {
            background: linear-gradient(135deg, var(--gold-light), var(--gold-main), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 2rem;
        }

        .input-wrapper i {
            position: absolute;
            right: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold-main);
            font-size: 1.2rem;
        }

        .form-input {
            width: 100%;
            padding: 1.2rem 3rem 1.2rem 1.5rem;
            background: rgba(0, 0, 0, 0.6);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.2rem;
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            outline: none;
            transition: all 0.4s;
        }

        .form-input:focus {
            border-color: var(--gold-main);
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .gold-btn {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, var(--gold-main), #8a6d3b);
            border: none;
            border-radius: 1.2rem;
            color: #000;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 1rem;
        }

        .gold-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .gold-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--gold-main);
            text-decoration: none;
            font-weight: bold;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .step {
            display: none;
        }
        .step.active-step {
            display: block;
        }

        .verification-section {
            background: rgba(212, 175, 55, 0.1);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin: 1.5rem 0;
            border: 1px solid rgba(212,175,55,0.3);
        }
    </style>
</head>
<body>

    <div class="forgot-card">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gold-main/10 border-2 border-gold-main mb-4">
                <i class="fa-solid fa-key text-3xl text-[var(--gold-main)]"></i>
            </div>
            <h1 class="text-3xl font-black gold-gradient-text italic">نسيت كلمة المرور</h1>
            <p class="text-slate-400 text-sm mt-2">سنرسل لك رمزاً لتغيير كلمة المرور</p>
        </div>

        <!-- الخطوة الأولى: إدخال البريد الإلكتروني -->
        <div id="step1" class="step active-step">
            <div class="input-wrapper">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="reset-email" class="form-input" placeholder="البريد الإلكتروني" required>
            </div>
            <button id="sendCodeBtn" class="gold-btn">
                <i class="fa-solid fa-paper-plane"></i> إرسال رمز التحقق
            </button>
        </div>

        <!-- الخطوة الثانية: إدخال الرمز وكلمة المرور الجديدة -->
        <div id="step2" class="step">
            <div class="verification-section">
                <div class="input-wrapper">
                    <i class="fa-solid fa-key"></i>
                    <input type="text" id="reset-code" class="form-input" placeholder="رمز التحقق (6 أرقام)" maxlength="6">
                </div>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="new-password" class="form-input" placeholder="كلمة المرور الجديدة">
                </div>
                <div class="input-wrapper">
                    <i class="fa-solid fa-check-circle"></i>
                    <input type="password" id="confirm-password" class="form-input" placeholder="تأكيد كلمة المرور الجديدة">
                </div>
            </div>
            <button id="resetBtn" class="gold-btn">
                <i class="fa-solid fa-rotate-right"></i> تغيير كلمة المرور
            </button>
            <button id="backToStep1" class="gold-btn" style="background: #2c3e50; margin-top: 0.5rem;">
                <i class="fa-solid fa-arrow-right"></i> إعادة إرسال الرمز
            </button>
        </div>

        <div class="text-center mt-6">
            <a href="login.html" class="back-link">
                <i class="fa-solid fa-arrow-right ml-1"></i> العودة إلى تسجيل الدخول
            </a>
        </div>
    </div>

    <script>
        const API_BASE_URL = "best-deal-production.up.railway.app";

        let pendingEmail = null;

        document.getElementById('sendCodeBtn').addEventListener('click', async () => {
            const email = document.getElementById('reset-email').value.trim();
            if (!email) {
                Swal.fire('خطأ', 'يرجى إدخال البريد الإلكتروني', 'error');
                return;
            }

            const btn = document.getElementById('sendCodeBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري الإرسال...';

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/send-reset-code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                if (data.success) {
                    pendingEmail = email;
                    // الانتقال إلى الخطوة الثانية
                    document.getElementById('step1').classList.remove('active-step');
                    document.getElementById('step2').classList.add('active-step');
                    Swal.fire('تم الإرسال', 'تم إرسال رمز التحقق إلى بريدك الإلكتروني', 'success');
                } else {
                    Swal.fire('خطأ', data.message, 'error');
                }
            } catch (err) {
                Swal.fire('خطأ', 'فشل الاتصال بالسيرفر', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> إرسال رمز التحقق';
            }
        });

        document.getElementById('resetBtn').addEventListener('click', async () => {
            const code = document.getElementById('reset-code').value.trim();
            const newPass = document.getElementById('new-password').value.trim();
            const confirmPass = document.getElementById('confirm-password').value.trim();

            if (!code || !newPass || !confirmPass) {
                Swal.fire('خطأ', 'يرجى ملء جميع الحقول', 'error');
                return;
            }
            if (newPass !== confirmPass) {
                Swal.fire('خطأ', 'كلمة المرور الجديدة وتأكيدها غير متطابقتين', 'error');
                return;
            }
            if (newPass.length < 6) {
                Swal.fire('خطأ', 'كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
                return;
            }

            const btn = document.getElementById('resetBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري التغيير...';

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: pendingEmail,
                        code: code,
                        newPassword: newPass
                    })
                });
                const data = await response.json();
                if (data.success) {
                    Swal.fire('تم التغيير', 'تم تغيير كلمة المرور بنجاح، يمكنك تسجيل الدخول الآن', 'success')
                        .then(() => window.location.href = 'login.html');
                } else {
                    Swal.fire('فشل', data.message, 'error');
                }
            } catch (err) {
                Swal.fire('خطأ', 'فشل الاتصال بالسيرفر', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-rotate-right"></i> تغيير كلمة المرور';
            }
        });

        document.getElementById('backToStep1').addEventListener('click', () => {
            document.getElementById('step2').classList.remove('active-step');
            document.getElementById('step1').classList.add('active-step');
            document.getElementById('reset-code').value = '';
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-password').value = '';
        });
    </script>
</body>
</html>
