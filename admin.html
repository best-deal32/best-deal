<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - Best Deal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>body { background: #0f172a; color: #f1f5f9; }</style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-black mb-6 text-emerald-500">لوحة تحكم المشرف</h1>
        <div id="login-area" class="glass p-6 rounded-2xl">
            <input type="password" id="admin-pass" placeholder="كلمة المرور" class="bg-slate-800 p-3 rounded-xl text-white w-full mb-4">
            <button onclick="adminLogin()" class="bg-emerald-500 text-black px-6 py-2 rounded-xl font-bold">دخول</button>
        </div>
        <div id="admin-panel" class="hidden space-y-6">
            <h2 class="text-xl font-bold">طلبات الإيداع</h2>
            <div id="deposits-list" class="grid gap-4"></div>
        </div>
    </div>
    <script>
        const SUPABASE_URL = "https://yourproject.supabase.co";
        const SUPABASE_ANON_KEY = "your-anon-key";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const ADMIN_PASSWORD = "admin123"; // غيرها إلى كلمة سر قوية
        
        async function adminLogin() {
            const pass = document.getElementById('admin-pass').value;
            if (pass !== ADMIN_PASSWORD) { alert("كلمة المرور غير صحيحة"); return; }
            document.getElementById('login-area').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            loadDeposits();
        }
        
        async function loadDeposits() {
            const { data: deposits, error } = await supabase
                .from('deposits')
                .select('*, users(username)')
                .eq('status', 'pending')
                .order('created_at', { ascending: false });
            if (error) { console.error(error); return; }
            const container = document.getElementById('deposits-list');
            if (!deposits.length) { container.innerHTML = '<p class="text-slate-400">لا توجد طلبات معلقة</p>'; return; }
            container.innerHTML = deposits.map(d => `
                <div class="bg-slate-800 p-5 rounded-2xl border border-emerald-500/30">
                    <div class="flex justify-between items-start">
                        <div>
                            <p><strong>المستخدم:</strong> ${d.users.username}</p>
                            <p><strong>المبلغ:</strong> $${d.amount}</p>
                            <p><strong>التاريخ:</strong> ${new Date(d.created_at).toLocaleString()}</p>
                        </div>
                        <img src="${d.receipt_image_url}" class="max-h-32 rounded-lg shadow-md" onclick="window.open(this.src)">
                    </div>
                    <div class="flex gap-3 mt-4">
                        <button onclick="approveDeposit('${d.id}', ${d.amount}, '${d.user_id}')" class="bg-emerald-600 px-4 py-2 rounded-xl">قبول</button>
                        <button onclick="rejectDeposit('${d.id}')" class="bg-red-600 px-4 py-2 rounded-xl">رفض</button>
                    </div>
                </div>
            `).join('');
        }
        
        async function approveDeposit(depositId, amount, userId) {
            // 1. تحديث حالة الإيداع
            await supabase.from('deposits').update({ status: 'approved' }).eq('id', depositId);
            // 2. جلب بيانات المستخدم
            const { data: user, error } = await supabase.from('users').select('*').eq('id', userId).single();
            if (!user) return;
            // 3. تحديث رأس المال المستثمر
            const newInvested = (user.invested_capital || 0) + amount;
            let updateData = { invested_capital: newInvested };
            // إذا كان أول إيداع
            if (!user.first_deposit_done) {
                updateData.first_deposit_done = true;
                updateData.first_deposit_amount = amount;
                updateData.first_deposit_date = new Date().toISOString();
                updateData.first_profit_paid = false;
            }
            await supabase.from('users').update(updateData).eq('id', userId);
            alert("تم قبول الإيداع وتحديث رأس المال");
            loadDeposits();
        }
        
        async function rejectDeposit(depositId) {
            await supabase.from('deposits').update({ status: 'rejected' }).eq('id', depositId);
            alert("تم رفض الإيداع");
            loadDeposits();
        }
    </script>
</body>
</html>
